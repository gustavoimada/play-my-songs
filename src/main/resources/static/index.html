<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring PlayMySongs</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/indexController.js" defer></script>
</head>
<body>
<section class="hero hero--home">
    <div class="hero__overlay"></div>

    <header class="topbar home-topbar">
        <div class="home-topbar__content">
            <p class="brand">Spring PlayMySongs</p>
            <h1>Gerencie suas músicas em uma interface moderna e direta.</h1>
            <p class="subtitle">
                Envie arquivos mp3, organize os dados da faixa e acesse o módulo de busca com uma home page mais limpa e objetiva.
            </p>

            <div class="hero__actions">
                <a class="btn btn--primary" href="cadastroMusica.html">Enviar música</a>
                <a class="btn btn--secondary" href="pesquisa.html">Ir para pesquisa</a>
            </div>
        </div>

        <aside class="home-suggestion">
            <p class="eyebrow">Sugestão do dia</p>
            <h2>Faixa em destaque</h2>
            <div id="filme-sugerido" class="suggestion-box home-suggestion__box"></div>
            <button class="card__button home-suggestion__button" type="button" onclick="trocarSugestao()">
                Trocar sugestão
            </button>
        </aside>
    </header>
</section>
</body>
</html>
